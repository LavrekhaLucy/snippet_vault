version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    environment:
      - APP_PORT=3001
      - APP_HOST=0.0.0.0
    restart: always

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=http://host.docker.internal:3001
    environment:
#      - NEXT_PUBLIC_API_URL=http://backend:3001
      - NEXT_PUBLIC_API_URL=http://host.docker.internal:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend
